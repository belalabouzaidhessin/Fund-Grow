{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h3 class="fw-bold text-dark mb-4"><i class="fas fa-comments text-primary me-2"></i> Investors for: {{ project.name }}</h3>
        
        <div class="card shadow border-0 rounded-4">
            <div class="list-group list-group-flush rounded-4">
                {% for investor in investors %}
                    <a href="{{ url_for('chat.project_chat', project_id=project.id, other_user_id=investor.id) }}" class="list-group-item list-group-item-action d-flex align-items-center justify-content-between p-4 hover-lift">
                        <div class="d-flex align-items-center">
                            <i class="fas fa-user-circle fa-2x text-secondary me-3"></i>
                            <div>
                                <h5 class="fw-bold text-dark mb-1">{{ investor.name }}</h5>
                                <small class="text-muted"><i class="fas fa-envelope me-1"></i> {{ investor.email }}</small>
                            </div>
                        </div>
                        <span class="btn btn-primary btn-sm fw-bold"><i class="fas fa-paper-plane me-1"></i> Message</span>
                    </a>
                {% else %}
                    <div class="text-center p-5 text-muted">
                        <i class="fas fa-users-slash fa-3x mb-3 opacity-50"></i>
                        <h5>No investors yet.</h5>
                        <p>Once investments are made, you can chat with your backers here.</p>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
