{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-primary text-white text-center py-4 border-0">
                <h2 class="mb-0 fw-bold"><i class="fas fa-sign-in-alt me-3"></i>Welcome Back</h2>
                <p class="mb-0 mt-2 text-primary-light">Log in to your FundGrow account</p>
            </div>
            <div class="card-body p-5 bg-light">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="form-floating mb-4 shadow-sm">
                        <input type="email" name="email" class="form-control focus-ring" id="emailInput"
                            placeholder="name@example.com" required>
                        <label for="emailInput" class="text-muted"><i class="fas fa-envelope me-2"></i>Email
                            Address</label>
                    </div>
                    <div class="form-floating mb-5 shadow-sm">
                        <input type="password" name="password" class="form-control focus-ring" id="pwdInput"
                            placeholder="Password" required>
                        <label for="pwdInput" class="text-muted"><i class="fas fa-lock me-2"></i>Password</label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow hover-lift py-3">Log
                        In</button>
                </form>
                <div class="text-center mt-4">
                    <span class="text-secondary">Don't have an account?</span> <a href="{{ url_for('auth.register') }}"
                        class="fw-bold text-primary text-decoration-none">Register here</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
